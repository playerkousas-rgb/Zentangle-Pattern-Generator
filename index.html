    <script>
class ZentangleGenerator {
    constructor() {
        this.mainCanvas = document.getElementById('mainCanvas');
        this.regionCanvas = document.getElementById('regionCanvas');
        this.originalCanvas = document.getElementById('originalCanvas');
        this.mainCtx = this.mainCanvas.getContext('2d');
        this.regionCtx = this.regionCanvas.getContext('2d');
        this.originalCtx = this.originalCanvas.getContext('2d');
        
        this.originalImage = null;
        this.mask = null;
        this.regions = [];
        this.selectedPatterns = new Set();
        this.regionPatternAssign = [];
        
        this.settings = { density: 20, strokeWidth: 0.5, threshold: 80, regionCount: 6, addShading: true, showOutline: true, bgOption: 'white' };
        
        this.patterns = [
            { name: 'Printemps', fill: (c,x,y,s) => { c.beginPath(); for(let a=0;a<Math.PI*4;a+=0.1){const r=s*0.4*a/(Math.PI*4); c.lineTo(x+r*Math.cos(a),y+r*Math.sin(a)); } c.stroke(); }},
            { name: 'Crescent Moon', fill: (c,x,y,s) => { for(let i=0;i<4;i++){ c.beginPath(); c.arc(x,y+i*s*0.25,s*0.35*(1-i*0.12),Math.PI*0.15,Math.PI*0.85); c.stroke(); }}},
            { name: 'Hollibaugh', fill: (c,x,y,s) => { const w=s*0.15; for(let i=-1;i<=1;i++){ c.fillRect(x-s*0.5,y+i*s*0.35-w,s,w*2); } for(let i=-1;i<=1;i++){ c.fillRect(x+i*s*0.35-w,y-s*0.5,w*2,s); }}},
            { name: 'Tipple', fill: (c,x,y,s) => { c.beginPath(); c.arc(x,y,s*(0.12+Math.random()*0.18),0,Math.PI*2); c.stroke(); }},
            { name: 'Mooka', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x,y+s*0.45); c.bezierCurveTo(x-s*0.6,y+s*0.3,x-s*0.4,y-s*0.5,x,y-s*0.45); c.bezierCurveTo(x+s*0.4,y-s*0.5,x+s*0.6,y+s*0.3,x,y+s*0.45); c.stroke(); }},
            { name: 'Paradox', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x,y-s*0.45); c.lineTo(x+s*0.45,y+s*0.45); c.lineTo(x-s*0.45,y+s*0.45); c.closePath(); c.stroke(); for(let i=1;i<4;i++){ c.beginPath(); c.moveTo(x-s*0.45+s*0.45*i*2,y+s*0.45-s*0.45*i*2); c.lineTo(x,y+s*0.45-s*0.45*i); c.stroke(); }}},
            { name: 'Flux', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x-s*0.5,y); c.quadraticCurveTo(x,y-s*0.25,x+s*0.5,y); c.stroke(); c.beginPath(); c.moveTo(x-s*0.5,y); c.quadraticCurveTo(x,y+s*0.12,x+s*0.5,y); c.stroke(); }},
            { name: 'Shattuck', fill: (c,x,y,s) => { for(let i=0;i<3;i++){ c.beginPath(); c.moveTo(x-s*0.4,y+i*s*0.2); c.lineTo(x,y+i*s*0.2+s*0.2); c.lineTo(x+s*0.4,y+i*s*0.2); c.stroke(); }}},
            { name: 'Knightsbridge', fill: (c,x,y,s) => { const cs=s*0.35; for(let i=-1;i<=1;i++)for(let j=-1;j<=1;j++){ if((i+j+10)%2===0) c.fillRect(x+i*cs-cs/2,y+j*cs-cs/2,cs,cs); }}},
            { name: 'Keeko', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x,y-s*0.35); c.lineTo(x+s*0.35,y); c.lineTo(x,y+s*0.35); c.lineTo(x-s*0.35,y); c.closePath(); c.stroke(); }},

            { name: 'Fengle', fill: (c,x,y,s) => { for(let i=-2;i<=2;i++){ c.beginPath(); c.moveTo(x,y); c.lineTo(x+s*0.4*Math.cos(-Math.PI/2+i*0.3),y+s*0.4*Math.sin(-Math.PI/2+i*0.3)); c.stroke(); }}},
            { name: 'Striping', fill: (c,x,y,s) => { for(let i=-2;i<=2;i++) c.fillRect(x-s*0.4,y+i*s*0.25,s*0.8,1); }},
            { name: 'Cadent', fill: (c,x,y,s) => { for(let i=-1;i<=1;i++){ c.beginPath(); c.arc(x+i*s*0.4,y,s*0.2,0,Math.PI); c.stroke(); }}},
            { name: 'Nzeppel', fill: (c,x,y,s) => { c.beginPath(); c.ellipse(x,y,s*0.25,s*0.35,0,0,Math.PI*2); c.stroke(); }},
            { name: 'Betweed', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x,y-s*0.35); c.lineTo(x+s*0.35,y); c.lineTo(x,y+s*0.35); c.lineTo(x-s*0.35,y); c.closePath(); c.stroke(); c.beginPath(); c.moveTo(x-s*0.2,y-s*0.2); c.lineTo(x+s*0.2,y+s*0.2); c.moveTo(x+s*0.2,y-s*0.2); c.lineTo(x-s*0.2,y+s*0.2); c.stroke(); }},

            { name: 'Pokeleaf', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x,y+s*0.3); c.quadraticCurveTo(x-s*0.25,y,x,y-s*0.3); c.quadraticCurveTo(x+s*0.25,y,x,y+s*0.3); c.stroke(); }},
            { name: 'Pokeroot', fill: (c,x,y,s) => { c.beginPath(); c.arc(x,y,s*0.15,0,Math.PI*2); c.stroke(); c.fillRect(x-1,y+s*0.15,2,s*0.2); }},
            { name: 'Cubine', fill: (c,x,y,s) => { c.strokeRect(x-s*0.35,y-s*0.35,s*0.7,s*0.7); for(let i=-1;i<=1;i++) c.fillRect(x-s*0.35,y+i*s*0.23-1,s*0.7,2); }},
            { name: 'Beadlines', fill: (c,x,y,s) => { for(let i=-2;i<=2;i++){ c.beginPath(); c.arc(x+i*s*0.2,y,s*0.08,0,Math.PI*2); c.stroke(); }}},
            { name: 'Echoism', fill: (c,x,y,s) => { for(let i=0;i<3;i++){ c.beginPath(); c.arc(x,y,s*0.3*(1-i*0.25),0,Math.PI*2); c.stroke(); }}},
            { name: 'Ennies', fill: (c,x,y,s) => { for(let i=-1;i<=1;i++){ c.beginPath(); c.arc(x+i*s*0.25,y,s*0.12,0,Math.PI*2); c.stroke(); }}},
            { name: 'Fescu', fill: (c,x,y,s) => { for(let i=-1;i<=1;i++){ c.beginPath(); c.moveTo(x,y); c.lineTo(x+i*s*0.2,y-s*0.35); c.stroke(); }}},
            { name: 'Huggins', fill: (c,x,y,s) => { c.beginPath(); c.arc(x-s*0.2,y,s*0.15,0,Math.PI*2); c.stroke(); c.beginPath(); c.arc(x+s*0.2,y,s*0.15,0,Math.PI*2); c.stroke(); }},
            { name: 'Icanthis', fill: (c,x,y,s) => { for(let i=0;i<5;i++){ const a=Math.PI*2*i/5; c.beginPath(); c.ellipse(x+s*0.25*Math.cos(a),y+s*0.25*Math.sin(a),s*0.1,s*0.05,a,0,Math.PI*2); c.stroke(); }}},
            { name: 'Jetties', fill: (c,x,y,s) => { c.fillRect(x-s*0.4,y-2,s*0.8,4); c.fillRect(x-2,y-s*0.4,4,s*0.8); }},
            { name: 'Juke', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x-s*0.3,y-s*0.3); c.lineTo(x+s*0.3,y-s*0.3); c.lineTo(x+s*0.3,y+s*0.3); c.lineTo(x-s*0.3,y+s*0.3); c.lineTo(x-s*0.3,y); c.lineTo(x,y); c.lineTo(x,y+s*0.3); c.stroke(); }},
            { name: 'Jonqal', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x,y-s*0.35); c.quadraticCurveTo(x+s*0.35,y,x,y+s*0.35); c.stroke(); c.beginPath(); c.moveTo(x,y-s*0.18); c.quadraticCurveTo(x+s*0.18,y,x,y+s*0.18); c.stroke(); }},
            { name: 'Kandysnake', fill: (c,x,y,s) => { for(let i=-1;i<=1;i++){ c.beginPath(); c.arc(x+i*s*0.3,y,s*0.15,0,Math.PI); c.stroke(); }}},
            { name: 'Knase', fill: (c,x,y,s) => { c.beginPath(); c.arc(x,y,s*0.3,Math.PI*0.5,Math.PI*1.5); c.stroke(); c.beginPath(); c.arc(x,y,s*0.15,Math.PI*1.5,Math.PI*0.5); c.stroke(); }},
            { name: 'Kule', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x,y-s*0.3); c.lineTo(x+s*0.3,y); c.lineTo(x,y+s*0.3); c.lineTo(x-s*0.3,y); c.closePath(); c.stroke(); }},
            { name: 'Kruffle', fill: (c,x,y,s) => { c.beginPath(); for(let a=0;a<Math.PI*3;a+=0.15){const r=s*0.35*a/(Math.PI*3); c.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));} c.stroke(); }},

            { name: 'Meringue', fill: (c,x,y,s) => { c.beginPath(); c.arc(x,y-s*0.15,s*0.15,0,Math.PI*2); c.stroke(); c.beginPath(); c.arc(x,y+s*0.15,s*0.15,0,Math.PI*2); c.stroke(); }},
            { name: 'Msst', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x-s*0.3,y); c.lineTo(x,y-s*0.3); c.lineTo(x+s*0.3,y); c.lineTo(x,y+s*0.3); c.closePath(); c.stroke(); }},
            { name: 'Nekton', fill: (c,x,y,s) => { for(let i=-1;i<=1;i++){ c.beginPath(); c.arc(x+i*s*0.3,y,s*0.12,0,Math.PI*2); c.stroke(); }}},
            { name: 'Onamato', fill: (c,x,y,s) => { c.beginPath(); c.arc(x,y,s*0.3,0,Math.PI*2); c.stroke(); c.fillRect(x-2,y-2,4,4); }},
            { name: 'Orlique', fill: (c,x,y,s) => { c.beginPath(); c.ellipse(x,y,s*0.35,s*0.2,0,0,Math.PI*2); c.stroke(); }},
            { name: 'Palrevo', fill: (c,x,y,s) => { c.beginPath(); c.moveTo(x,y-s*0.3); c.lineTo(x+s*0.3,y); c.lineTo(x,y+s*0.3); c.lineTo(x-s*0.3,y); c.closePath(); c.stroke(); }},
            { name: 'Ravel', fill: (c,x,y,s) => { c.beginPath(); for(let a=0;a<Math.PI*3;a+=0.1){const r=s*0.35*a/(Math.PI*3); c.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));} c.stroke(); }}
        ];
        
        this.bindEvents();
        this.generatePatternGrid();
    }
    
    isInMask(x,y,m,w){const i=Math.floor(y)*w+Math.floor(x);return i>=0&&i<m.length&&m[i]>0;}
    
    fillRegion(ctx,region,pi,w,h){
        if(pi<0||pi>=this.patterns.length)return;
        const p=this.patterns[pi];
        const d=this.settings.density;
        ctx.strokeStyle='#000';
        ctx.fillStyle='#000';
        ctx.lineWidth=this.settings.strokeWidth;
        ctx.lineCap='round';
        for(let py=0;py<h;py+=d*1.1){
            for(let px=0;px<w;px+=d*1.1){
                if(this.isInMask(px,py,region,w)) p.fill(ctx,px,py,d);
            }
        }
    }
    
    generatePatternGrid(){
        const g=document.getElementById('patternGrid');
        g.innerHTML='';
        this.patterns.forEach((p,i)=>{
            const item=document.createElement('div');
            item.className=`pattern-item ${this.selectedPatterns.has(i)?'selected':''}`;
            item.title=p.name;
            const cv=document.createElement('canvas');
            cv.width=60;cv.height=60;
            const c=cv.getContext('2d');
            c.fillStyle='#fff';
            c.fillRect(0,0,60,60);
            c.strokeStyle='#333';
            c.fillStyle='#333';
            c.lineWidth=1;
            p.fill(c,30,30,28);
            const cm=document.createElement('div');
            cm.className='check-mark';
            cm.textContent='✓';
            item.appendChild(cv);
            item.appendChild(cm);
            item.onclick=()=>this.toggle(i);
            g.appendChild(item);
        });
        this.updateCount();
    }
    
    toggle(i){
        if(this.selectedPatterns.has(i))this.selectedPatterns.delete(i);
        else this.selectedPatterns.add(i);
        document.querySelectorAll('.pattern-item').forEach((el,idx)=>el.classList.toggle('selected',this.selectedPatterns.has(idx)));
        this.updateCount();
        if(this.originalImage&&this.selectedPatterns.size>0){this.assign();this.generate();}
    }
    updateCount(){document.getElementById('selectedCount').textContent=this.selectedPatterns.size;}
    selectAll(){
        this.patterns.forEach((_,i)=>this.selectedPatterns.add(i));
        document.querySelectorAll('.pattern-item').forEach(el=>el.classList.add('selected'));
        this.updateCount();
        if(this.originalImage){this.assign();this.generate();}
    }
    clearAll(){
        this.selectedPatterns.clear();
        document.querySelectorAll('.pattern-item').forEach(el=>el.classList.remove('selected'));
        this.updateCount();
    }
    assign(){
        const l=Array.from(this.selectedPatterns);
        if(!l.length)return;
        this.regionPatternAssign=this.regions.map((_,i)=>l[i%l.length]);
        this.updateRegionUI();
    }
    shuffle(){
        if(this.regionPatternAssign.length<2)return;
        for(let i=this.regionPatternAssign.length-1;i>0;i--){
            const j=Math.floor(Math.random()*(i+1));
            [this.regionPatternAssign[i],this.regionPatternAssign[j]]=[this.regionPatternAssign[j],this.regionPatternAssign[i]];
        }
        this.updateRegionUI();
        this.generate();
    }
    updateRegionUI(){
        const g=document.getElementById('regionAssignGrid');
        g.innerHTML='';
        const cl=['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffeaa7','#dfe6e9','#fd79a8','#a29bfe','#00b894','#e17055','#0984e3','#6c5ce7'];
        this.regions.forEach((r,i)=>{
            const c=document.createElement('div');
            c.className='region-card';
            c.innerHTML=`<div style="width:16px;height:16px;border-radius:50%;background:${cl[i%cl.length]};margin:0 auto 6px;"></div><div class="text-xs mb-1" style="color:rgba(255,255,255,0.5);">區域${i+1}</div>`;
            const s=document.createElement('select');
            s.innerHTML=this.patterns.map((p,idx)=>`<option value="${idx}" ${this.regionPatternAssign[i]===idx?'selected':''}>${p.name}</option>`).join('');
            s.onchange=e=>this.regionPatternAssign[i]=+e.target.value;
            c.appendChild(s);
            g.appendChild(c);
        });
    }
    
    bindEvents(){
        const uz=document.getElementById('uploadZone');
        const fi=document.getElementById('fileInput');
        uz.onclick=()=>fi.click();
        uz.ondragover=e=>{e.preventDefault();uz.classList.add('dragover');};
        uz.ondragleave=()=>uz.classList.remove('dragover');
        uz.ondrop=e=>{e.preventDefault();uz.classList.remove('dragover');if(e.dataTransfer.files[0])this.load(e.dataTransfer.files[0]);};
        fi.onchange=e=>{if(e.target.files[0])this.load(e.target.files[0]);};
        
        document.getElementById('densitySlider').oninput=e=>{this.settings.density=+e.target.value;document.getElementById('densityValue').textContent=e.target.value;};
        document.getElementById('strokeSlider').oninput=e=>{this.settings.strokeWidth=+e.target.value/10;document.getElementById('strokeValue').textContent=(+e.target.value/10).toFixed(1)+'px';};
        document.getElementById('thresholdSlider').oninput=e=>{this.settings.threshold=+e.target.value;document.getElementById('thresholdValue').textContent=e.target.value;};
        document.getElementById('regionSlider').oninput=e=>{this.settings.regionCount=+e.target.value;document.getElementById('regionValue').textContent=e.target.value;};
        document.getElementById('addShading').onchange=e=>{this.settings.addShading=e.target.checked;if(this.originalImage)this.generate();};
        document.getElementById('showOutline').onchange=e=>{this.settings.showOutline=e.target.checked;if(this.originalImage)this.generate();};
        document.getElementById('bgOption').onchange=e=>{this.settings.bgOption=e.target.value;if(this.originalImage)this.generate();};
        
        document.getElementById('generateBtn').onclick=()=>this.generate();
        document.getElementById('downloadBtn').onclick=()=>this.dl();
        document.getElementById('selectAllBtn').onclick=()=>this.selectAll();
        document.getElementById('clearAllBtn').onclick=()=>this.clearAll();
        document.getElementById('shuffleBtn').onclick=()=>this.shuffle();
        document.getElementById('applyAssignBtn').onclick=()=>this.generate();
        
        document.querySelectorAll('.tab-btn').forEach(b=>{
            b.onclick=e=>{
                document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
                e.target.classList.add('active');
                const v=e.target.dataset.view;
                document.getElementById('regionAssignView').style.display=v==='regions'?'block':'none';
                document.getElementById('regionCanvas').style.display=v==='regions'?'block':'none';
                document.getElementById('mainCanvas').style.display=v==='regions'?'none':'block';
            };
        });
    }
    
    load(f){
        const r=new FileReader();
        r.onload=e=>{
            const im=new Image();
            im.onload=()=>{
                this.originalImage=im;
                let w=im.width,h=im.height;
                if(w>800||h>800){if(w>h){h=h/w*800;w=800;}else{w=w/h*800;h=800;}}
                [this.mainCanvas,this.regionCanvas,this.originalCanvas].forEach(c=>{c.width=w;c.height=h;});
                this.originalCtx.drawImage(im,0,0,w,h);
                document.getElementById('originalCanvas').style.display='block';
                document.getElementById('originalPlaceholder').style.display='none';
                document.getElementById('generateBtn').disabled=false;
                if(this.selectedPatterns.size===0)this.selectAll();
                else this.generate();
            };
            im.src=e.target.result;
        };
        r.readAsDataURL(f);
    }
    
    async generate(){
        if(!this.originalImage||!this.selectedPatterns.size)return;
        document.getElementById('processingOverlay').style.display='flex';
        document.getElementById('placeholderText').style.display='none';
        document.getElementById('mainCanvas').style.display='block';
        await new Promise(r=>setTimeout(r,30));
        const w=this.mainCanvas.width,h=this.mainCanvas.height;
        document.getElementById('processingText').textContent='提取遮罩...';
        await new Promise(r=>setTimeout(r,10));
        this.mask=this.maskExtract(w,h);
        document.getElementById('processingText').textContent='分割...';
        await new Promise(r=>setTimeout(r,10));
        this.regions=this.seg(w,h);
        if(this.regionPatternAssign.length!==this.regions.length)this.assign();
        this.drawReg(w,h);
        document.getElementById('processingText').textContent='生成...';
        await new Promise(r=>setTimeout(r,10));
        this.render(w,h);
        document.getElementById('processingOverlay').style.display='none';
    }
    
    maskExtract(w,h){
        const t=document.createElement('canvas');
        t.width=w;t.height=h;
        const c=t.getContext('2d');
        c.drawImage(this.originalImage,0,0,w,h);
        const d=c.getImageData(0,0,w,h).data;
        const m=new Uint8Array(w*h);
        for(let i=0;i<w*h;i++){
            const idx=i*4;
            const r=d[idx],g=d[idx+1],b=d[idx+2];
            const light=r>220&&g>220&&b>220;
            const nearW=Math.abs(r-g)<30&&Math.abs(g-b)<30&&r>200;
            m[i]=(!light&&!nearW)?255:0;
        }
        const tp=new Uint8Array(w*h);
        for(let y=3;y<h-3;y++)for(let x=3;x<w-3;x++){let mx=0;for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++)mx=Math.max(mx,m[(y+dy)*w+x+dx]);tp[y*w+x]=mx;}
        for(let y=3;y<h-3;y++)for(let x=3;x<w-3;x++){let mn=255;for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++)mn=Math.min(mn,tp[(y+dy)*w+x+dx]);m[y*w+x]=mn;}
        const vs=new Uint8Array(w*h);
        const q=[];
        for(let x=0;x<w;x++){if(!m[x])q.push([x,0]);if(!m[(h-1)*w+x])q.push([x,h-1]);}
        for(let y=0;y<h;y++){if(!m[y*w])q.push([0,y]);if(!m[y*w+w-1])q.push([w-1,y]);}
        while(q.length){
            const[x,y]=q.shift();
            const idx=y*w+x;
            if(x<0||x>=w||y<0||y>=h||vs[idx]||m[idx])continue;
            vs[idx]=1;
            m[idx]=0;
            q.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
        }
        return m;
    }
    
    seg(w,h){
        const rg=[];
        const n=this.settings.regionCount;
        let cx=0,cy=0,cnt=0;
        for(let y=0;y<h;y++)for(let x=0;x<w;x++)if(this.mask[y*w+x]){cx+=x;cy+=y;cnt++;}
        if(!cnt)return rg;
        cx/=cnt;cy/=cnt;
        const sd=[];
        for(let i=0;i<n;i++){
            const a=Math.PI*2/n*i+Math.random()*0.5;
            sd.push({x:cx+Math.random()*Math.min(w,h)*0.3*Math.cos(a),y:cy+Math.random()*Math.min(w,h)*0.3*Math.sin(a)});
        }
        for(let i=0;i<n;i++){
            const r=new Uint8Array(w*h);
            for(let y=0;y<h;y++){
                for(let x=0;x<w;x++){
                    if(this.mask[y*w+x]){
                        let mn=Infinity,ns=0;
                        sd.forEach((s,j)=>{const d=Math.hypot(x-s.x,y-s.y);if(d<mn){mn=d;ns=j;}});
                        if(ns===i)r[y*w+x]=255;
                    }
                }
            }
            rg.push({mask:r});
        }
        return rg;
    }
    
    drawReg(w,h){
        this.regionCtx.clearRect(0,0,w,h);
        const cl=['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffeaa7','#dfe6e9','#fd79a8','#a29bfe','#00b894','#e17055','#0984e3','#6c5ce7'];
        this.regions.forEach((r,i)=>{
            this.regionCtx.fillStyle=cl[i%cl.length];
            for(let y=0;y<h;y++)for(let x=0;x<w;x++)if(r.mask[y*w+x])this.regionCtx.fillRect(x,y,1,1);
        });
    }
    
    render(w,h){
        // Step 1: Create temp canvas
        const t=document.createElement('canvas');
        t.width=w;t.height=h;
        const tc=t.getContext('2d');
        
        // Step 2: White background
        tc.fillStyle='#fff';
        tc.fillRect(0,0,w,h);
        
        // Step 3: Fill patterns
        this.regions.forEach((r,i)=>{
            const pi=this.regionPatternAssign[i]||0;
            this.fillRegion(tc,r.mask,pi,w,h);
        });
        
        // Step 4: Shading
        if(this.settings.addShading){
            const id=tc.getImageData(0,0,w,h);
            const dd=id.data;
            for(let y=1;y<h-1;y++){
                for(let x=1;x<w-1;x++){
                    const idx=y*w+x;
                    if(this.mask[idx]){
                        let ed=false,cr=-1;
                        for(let r=0;r<this.regions.length;r++)if(this.regions[r].mask[idx]){cr=r;break;}
                        if(cr>=0){
                            outer:for(let dy=-1;dy<=1;dy++){
                                for(let dx=-1;dx<=1;dx++){
                                    let nr=-1;
                                    for(let r=0;r<this.regions.length;r++)if(this.regions[r].mask[(y+dy)*w+x+dx]){nr=r;break;}
                                    if(nr!==cr){ed=true;break outer;}
                                }
                            }
                        }
                        if(ed){
                            const p=idx*4;
                            dd[p]=Math.max(0,dd[p]-50);
                            dd[p+1]=Math.max(0,dd[p+1]-50);
                            dd[p+2]=Math.max(0,dd[p+2]-50);
                        }
                    }
                }
            }
            tc.putImageData(id,0,0);
        }
        
        // Step 5: Outline
        if(this.settings.showOutline){
            const ol=document.createElement('canvas');
            ol.width=w;ol.height=h;
            const oc=ol.getContext('2d');
            oc.drawImage(this.originalImage,0,0,w,h);
            const od=oc.getImageData(0,0,w,h).data;
            const ed=oc.getImageData(0,0,w,h);
            const edd=ed.data;
            for(let i=0;i<w*h;i++){
                const idx=i*4;
                const g=0.299*od[idx]+0.587*od[idx+1]+0.114*od[idx+2];
                if(this.mask[i]){
                    if(g<this.settings.threshold){
                        edd[idx]=edd[idx+1]=edd[idx+2]=0;
                        edd[idx+3]=255;
                    }else edd[idx+3]=0;
                }else edd[idx+3]=0;
            }
            oc.putImageData(ed,0,0);
            tc.drawImage(ol,0,0);
        }
        
        // Step 6: Clear main canvas
        this.mainCtx.clearRect(0,0,w,h);
        
        // Step 7: Background
        if(this.settings.bgOption==='white'){
            this.mainCtx.fillStyle='#fff';
            this.mainCtx.fillRect(0,0,w,h);
        }
        
        // Step 8: Copy only inside mask
        const fid=tc.getImageData(0,0,w,h);
        const fdd=fid.data;
        const out=this.mainCtx.createImageData(w,h);
        const od=out.data;
        
        for(let i=0;i<w*h;i++){
            const idx=i*4;
            if(this.mask[i]){
                od[idx]=fdd[idx];
                od[idx+1]=fdd[idx+1];
                od[idx+2]=fdd[idx+2];
                od[idx+3]=fdd[idx+3];
            }else if(this.settings.bgOption==='white'){
                od[idx]=od[idx+1]=od[idx+2]=255;
                od[idx+3]=255;
            }else{
                od[idx+3]=0;
            }
        }
        
        this.mainCtx.putImageData(out,0,0);
    }
    
    dl(){
        const lk=document.createElement('a');
        lk.download=`zentangle-${Date.now()}.png`;
        lk.href=this.mainCanvas.toDataURL('image/png');
        lk.click();
    }
}

new ZentangleGenerator();
    </script>
